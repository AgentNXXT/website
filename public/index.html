<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGenNext | Enterprise Agent Lifecycle Governance Platform</title>
<meta name="description" content="An Open Source Code First Unified Agent Platform to Build, Test, Deploy, Eval, Secure & Govern Production Grade Enterprise Autonomous Agents & AI Native Applications & Artifacts.">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000;
    --text: #fff;
    --accent: #a100ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 300;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  main {
    text-align: center;
    padding: 2rem;
  }
  h1 {
    font-size: clamp(2rem, 5vw, 4rem);
    font-weight: 300;
    letter-spacing: -0.08em;
    line-height: 0.9;
    font-stretch: 85%;
  }
  p { margin-top: 1.5rem; color: #888; font-size: 1.1rem; }
  a {
    display: inline-block;
    margin-top: 2rem;
    padding: 1rem 2rem;
    border: 1px solid #333;
    color: var(--text);
    text-decoration: none;
    transition: all 0.2s;
  }
  a:hover {
    background: var(--text);
    color: var(--bg);
  }
